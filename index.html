<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>곁, Besides®</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23141414%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M12%203a9%209%200%201%201%200%2018a9%209%200%200%201%200%20-18z%22%2F%3E%3Cpath%20d%3D%22M6%2012a6%206%200%200%201%206%20-6%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#ffffff; --c-body:#ffffff; --c-hi:#f4f4f6; --c-lo:#ececf0; --c-deep:#141414;
  --screen:#ffffff; --ink:#141414; --ink-soft:#8a8a8a; --acc:#acafff; --acc-ink:#141414; --line:#e2e2e6;
  --orb:radial-gradient(circle at 35% 28%,#ffffff 0%,var(--acc) 50%,#7ed6c6 116%);
  --ui:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --mono:"JetBrains Mono","Pretendard",ui-monospace,monospace;
}
html{font-size:15px}
body{font-family:var(--ui);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:2.4rem 1rem 3rem;color:var(--ink);background:var(--c-bg);-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(78% 56% at 50% 8%,var(--acc),transparent 68%);opacity:.55;transition:background .4s}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:none}
textarea{font:inherit;color:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--c-deep);border-radius:2px}

/* 플랫 톤 헬퍼 */
.raised{background:#fff}
.recess{background:transparent}

/* ===== 기계 ===== */
.stage{position:relative;width:376px;max-width:100%}
.machine{width:100%;max-width:100%;position:relative;z-index:1;background:var(--c-body);
  border-radius:44px 44px 16px 16px;padding:.7rem 0;border:1px solid var(--line);box-shadow:none}
.base{position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);width:74%;height:14px;border-radius:0 0 16px 16px;background:var(--c-lo);z-index:-1}

/* 머리 */
.head{padding:.5rem 1.5rem .2rem;display:flex;flex-direction:column;align-items:center;gap:.6rem}
.knobs{display:flex;align-items:center;gap:.8rem}
.knobs .d{width:.95rem;height:.95rem;border-radius:50%}
.knobs .ring{width:1.7rem;height:1.7rem;border-radius:50%;display:grid;place-items:center}
.knobs .ring::after{content:"";width:.78rem;height:.78rem;border-radius:50%;background:var(--c-body)}
.knobs .bar{width:.34rem;height:1.7rem;border-radius:9999px}
.logo{width:60%;padding:.3rem 0;border-radius:11px;text-align:center;background:none}
.logo b{font-size:1.22rem;font-weight:450;color:var(--ink);letter-spacing:-.03em}
.logo b sup{font-size:.5rem;font-weight:700;vertical-align:super;opacity:.7}

/* 창 (릴) */
.window{margin:.5rem 1.4rem 0;border-radius:18px;padding:.4rem;background:none}
.win-in{background:linear-gradient(rgba(255,255,255,.9),rgba(255,255,255,.9)),var(--acc);border:1px solid var(--line);border-radius:36px;min-height:8.2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.1rem 1rem;text-align:center;position:relative;overflow:hidden}
#slot{display:flex;flex-direction:column;gap:.55rem;width:100%}
#slot .k{font-family:var(--mono);font-size:.5rem;font-weight:400;letter-spacing:.29em;text-transform:uppercase;color:var(--ink-soft)}
#slot .tx{font-size:.8rem;font-weight:400;line-height:1.5;letter-spacing:-.01em;color:var(--ink);word-break:keep-all}
#slot .tx .hl{color:var(--ink);font-weight:400;text-decoration:underline;text-decoration-color:var(--acc);text-decoration-thickness:2px;text-underline-offset:4px;cursor:pointer;border-radius:3px;transition:background .15s}
#slot .tx .hl:hover{background:var(--acc)}
@keyframes rolled{0%{background:var(--acc)}100%{background:transparent}}
#slot .tx .hl.rolled{animation:rolled .55s ease}
.win-in.spin #slot{filter:blur(3px);opacity:.6;animation:reel .09s linear infinite}
@keyframes reel{0%{transform:translateY(-6px)}100%{transform:translateY(6px)}}
.drop{animation:drp .4s cubic-bezier(.2,1.3,.4,1)}
@keyframes drp{0%{opacity:0;transform:translateY(-1rem)}100%{opacity:1;transform:none}}

/* 버튼 줄 */
.btns{display:flex;gap:.5rem;margin:.7rem 1.4rem .2rem;justify-content:center}
.btns button{width:2.55rem;height:2.55rem;flex:0 0 auto;border-radius:50%;border:0;color:var(--ink);background:none;display:flex;align-items:center;justify-content:center;transition:background .12s,transform .1s}
.btns button .ic svg{width:20px;height:20px}
.btns button .ic{font-size:.85rem;line-height:1;color:var(--ink)}
.btns button:active{transform:translateY(1px);background:var(--c-lo)}
.btns button.lit{background:linear-gradient(rgba(255,255,255,.74),rgba(255,255,255,.74)),var(--acc);color:var(--ink)}
.btns button.lit .ic{color:var(--ink)}
.btns button.emph{background:linear-gradient(rgba(255,255,255,.86),rgba(255,255,255,.86)),var(--acc)}
.btns button.emph .ic{color:var(--acc)}
.draw{display:flex;flex-direction:column;align-items:center;gap:.05rem;background:none;padding:0;color:var(--acc);transition:transform .12s,filter .15s}
.draw .heart{width:2.15rem;height:2.15rem;fill:currentColor;display:block;filter:drop-shadow(0 1px 3px rgba(0,0,0,.14))}
.draw .dl{font-family:var(--mono);font-size:.46rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
.draw:active{transform:scale(.9)}
.draw:hover{filter:brightness(.96)}
.draw:active{transform:translateY(1px)}
.draw:hover{filter:brightness(.97)}
@keyframes drawHint{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
.draw.hint{animation:drawHint 1.4s ease 2}

/* 레버: 당김 원근감 (막대 길이 변화) */
.lever{position:absolute;right:-20px;top:38%;width:50px;height:74px;z-index:2;cursor:pointer}
.lever-base{position:absolute;left:5px;bottom:4px;width:15px;height:15px;border-radius:50%;background:var(--c-lo);box-shadow:inset 0 0 0 1px var(--line)}
.lever-arm{position:absolute;left:12.5px;bottom:11.5px;transform:translateX(-50%) rotate(30deg);transform-origin:50% 100%;display:flex;flex-direction:column;align-items:center}
.lever-ball{width:25px;height:25px;border-radius:50%;background:var(--acc);border:1px solid rgba(0,0,0,.1)}
.lever-stick{width:6px;height:34px;margin-top:-1px;border-radius:9999px;background:var(--c-lo);transform-origin:50% 100%}
.lever.pull .lever-arm{animation:leverPull .58s cubic-bezier(.34,.62,.3,1)}
@keyframes leverPull{0%,100%{transform:translateX(-50%) rotate(30deg)}50%{transform:translateX(-50%) rotate(120deg)}}

/* 하단 패널 + 노브 + 배출구 */
.lower{margin:1.1rem 1.4rem 0;border-radius:16px;padding:1rem}
.lower-in{height:3.6rem;display:flex;align-items:center;justify-content:center}
.knob{width:1.2rem;height:1.2rem;border-radius:50%;cursor:pointer;flex-shrink:0;padding:0;border:1px solid rgba(0,0,0,.2);background:var(--acc);-webkit-appearance:none;appearance:none;overflow:hidden;transition:transform .12s}
.knob::-webkit-color-swatch-wrapper{padding:0}
.knob::-webkit-color-swatch{border:none;border-radius:50%}
.knob::-moz-color-swatch{border:none;border-radius:50%}
.knob::after{content:none}
.knob:active{transform:translateY(1px)}
.tray{position:relative;margin:.7rem auto 0;width:80%;max-width:308px;height:.85rem;border-radius:9999px;background:var(--c-hi);border:1px solid var(--line)}
.tray::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:88%;height:3px;border-radius:3px;background:var(--ink);opacity:.5}

/* ===== 오버레이 ===== */
.ov{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(20,20,24,.4);backdrop-filter:blur(3px);z-index:60;padding:1.5rem}
.ov.open{display:flex}
.sheet{position:relative;width:100%;max-width:21rem;background:var(--c-body);border-radius:16px;padding:1.4rem 1.5rem;border:1px solid var(--line);box-shadow:none}
.sheet::before{content:none}
.sheet>*{position:relative}
@keyframes sheetIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ov.open .sheet{animation:sheetIn .26s cubic-bezier(.2,.9,.3,1.1)}
.sheet h3{font-family:var(--mono);font-size:.62rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
.sheet h3 .x{width:1.6rem;height:1.6rem;border-radius:50%;background:var(--c-hi);color:var(--ink-soft);font-size:.76rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.memoText{width:100%;min-height:5rem;background:var(--screen);border:1px solid var(--line);border-radius:12px;padding:.8rem .9rem;font-size:.85rem;color:var(--ink);font-family:var(--ui);line-height:1.6;resize:vertical;transition:border-color .15s}
.memoText:focus{border-color:var(--acc)}
.sheet .row{display:flex;gap:.5rem;margin-top:.9rem}
.sheet .row button{flex:1;padding:.7rem;border-radius:12px;font-size:.8rem;font-weight:450;color:var(--ink);background:#fff;border:1px solid var(--line)}
.sheet .row .go{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.sheet .row .go:active{transform:translateY(1px)}
.scl{max-height:16rem;overflow-y:auto;display:flex;flex-direction:column;gap:.1rem}
.scl .si{display:flex;gap:.5rem;align-items:baseline;padding:.5rem .1rem;border-bottom:1px solid var(--line);font-size:.8rem;color:var(--ink)}
.scl .si:last-child{border-bottom:0}
.scl .si .sk{font-family:var(--mono);font-size:.5rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap;flex-shrink:0}
.scl-empty{text-align:center;color:var(--ink-soft);font-size:.8rem;padding:2rem 0}
.cf-msg{font-size:.95rem;font-weight:400;color:var(--ink);text-align:center;line-height:1.5;margin:.3rem 0 1.2rem}
.status{text-align:center;font-size:.58rem;color:var(--ink-soft);margin:.5rem 1.4rem 0;letter-spacing:.04em}

/* ===== 영수증 (이미지·화면밖) ===== */
#receipt{width:268px;background:#f6f5f7}
/* 배출구에서 인쇄되어 나오는 종이 */
#paperMask{position:absolute;left:50%;transform:translateX(-50%);top:calc(100% - 1.2rem);width:268px;z-index:2;overflow:hidden;max-height:0;display:none;cursor:pointer;filter:drop-shadow(0 10px 16px rgba(60,50,40,.22))}
@keyframes printout{from{max-height:0}to{max-height:var(--ph,1600px)}}
#paperMask.run{animation:printout var(--pdur,3.4s) steps(40) both}
@keyframes tearShake{0%,100%{transform:translateX(-50%)}20%{transform:translateX(-51%) rotate(-.5deg)}40%{transform:translateX(-49%) rotate(.5deg)}60%{transform:translateX(-50.5%) rotate(-.3deg)}80%{transform:translateX(-49.5%)}}
#paperMask.torn{animation:tearShake .42s ease}
/* 확대 보기 */
.big-wrap{display:flex;flex-direction:column;align-items:center;gap:1.1rem;max-height:92vh}
.big-paper{zoom:1.3;filter:drop-shadow(0 12px 22px rgba(40,34,28,.3));max-height:64vh;overflow-y:auto;overflow-x:hidden}
@keyframes bigIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
#rcptBig.open .big-paper{animation:bigIn .3s cubic-bezier(.2,.9,.3,1.1)}
.big-actions{display:flex;gap:.5rem}
.big-actions button{display:flex;align-items:center;gap:.3rem;padding:.55rem .6rem;border-radius:12px;font-size:.66rem;font-weight:450;color:var(--ink);background:var(--c-hi)}
.big-actions button svg{width:15px;height:15px}
.big-actions button{border:1px solid var(--line)}
.big-actions button:active{transform:translateY(1px)}
#bigSave{background:var(--acc);color:var(--ink);border-color:var(--acc)}
/* 소리/릴 토글 */
.tools{display:flex;gap:.5rem;justify-content:center;align-items:center;margin-top:.15rem}
.tool{display:flex;align-items:center;gap:.26rem;padding:.22rem .55rem;border-radius:9999px;font-size:.54rem;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);background:var(--c-hi);transition:opacity .12s,transform .1s}
.tool svg{width:13px;height:13px}
.tool.off{opacity:.4;text-decoration:line-through}
.tool:active{transform:translateY(1px)}
@media print{
  @page{margin:12mm}
  body{background:#fff!important}
  body>*:not(#rcptBig){display:none!important}
  #rcptBig{position:static!important;display:block!important;background:none!important;backdrop-filter:none!important;padding:0!important}
  #rcptBig .big-wrap{display:block!important;max-height:none!important}
  #rcptBig .big-actions{display:none!important}
  #rcptBig .big-paper{zoom:1!important;transform:none!important;animation:none!important;filter:none!important;margin:0 auto!important;max-height:none!important;overflow:visible!important}
  #rcptBig *{box-shadow:none!important}
  .rc{box-shadow:none!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.rc{width:268px;padding:22px 20px;color:#141414;background:#fbfbfc;font-family:var(--mono);font-size:11px;line-height:1.6}
.rc-h{text-align:center;font-size:15px;font-weight:500;letter-spacing:.01em}
.rc-h span{display:block;font-size:9px;font-weight:400;letter-spacing:.12em;margin-top:4px;color:#666}
.rc-d{text-align:center;font-size:10px;color:#666;margin-top:5px}
.rc-sep{border-top:1px dashed #d0d0d0;margin:11px 0}.rc-sep.thin{border-top:1px solid #d0d0d0}
.rc-t{font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#8a8a8a;margin-bottom:6px}
.rc-i{margin-bottom:7px}.rc-i .rik{display:block;color:#918e97;font-size:7.5px;letter-spacing:.08em;margin-bottom:2px}
.rir{display:flex;justify-content:space-between;gap:10px;align-items:baseline}.rit{flex:1;font-size:9.5px;line-height:1.45}.rip{flex-shrink:0;white-space:nowrap;font-weight:500}
.rc-sum{display:flex;justify-content:space-between;font-size:12px;margin-top:3px}.rc-sum b{font-weight:600}.rc-sum.sub{font-size:10px;color:#757279}
.rc-note{text-align:center;font-size:9px;line-height:1.6;color:#8a8790;letter-spacing:.05em;margin-top:6px}
.rc-bar{display:flex;gap:1px;justify-content:center;align-items:flex-end;height:42px;margin-top:8px}.rc-bar i{display:block;height:100%;background:#2a2622}
.rc-num{text-align:center;font-size:10px;letter-spacing:.25em;margin-top:5px}
.rc-m{font-size:11.5px;white-space:pre-wrap;color:#333}
.rc-f{text-align:center;font-size:10px;color:#999;letter-spacing:.22em;margin-top:2px}
.rc-copy{text-align:center;font-size:9px;color:#918e97;letter-spacing:.1em;margin-top:7px}
@media(max-width:380px){.machine{width:100%}.lever{right:-12px}}
/* ── 접근성·반응형·상태 보정 ── */
body{overflow-x:hidden}
button:focus-visible,textarea:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.lever{padding:0}
.btns button:disabled{opacity:.4;cursor:default}
.btns button:disabled:active{transform:none;background:var(--c-hi)}
.lower-in{flex-direction:column;gap:.28rem}
.knobcap{font-family:var(--mono);font-size:.5rem;font-weight:500;letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase}
.scl .si .st{flex:1}
.scl .si .sd{flex-shrink:0;color:var(--ink-soft);font-size:.8rem;line-height:1;padding:.1rem .25rem}
.scl .si .sd:hover{color:var(--acc)}
@keyframes leverHint{0%,80%,100%{transform:translateX(-50%) rotate(30deg)}88%{transform:translateX(-50%) rotate(50deg)}94%{transform:translateX(-50%) rotate(30deg)}}
.lever.hint .lever-arm{animation:leverHint 2.6s ease 2}
@media(max-width:340px){.lever{right:-6px;width:34px}.lever-ball{width:24px;height:24px}}
/* Loop3 — 누적·단축키 */
.ticker{font-family:var(--mono);font-size:.56rem;font-weight:500;letter-spacing:.2em;color:var(--ink-soft);opacity:.9;margin-top:-.5rem}
.scl .si .st{cursor:pointer}
.scl .si .st:hover{color:var(--acc)}
/* Loop2 — 모드 칩 */
.actbar{display:flex;align-items:center;justify-content:center;margin:.55rem 1.4rem 0}
.modes{display:flex;gap:.85rem;align-items:center}
.mchip{display:flex;align-items:center;gap:.34rem;padding:.15rem 0;background:none;border:0;font-size:.66rem;font-weight:450;color:var(--ink-soft);transition:color .15s}
.mchip::before{content:"";width:.5rem;height:.5rem;border-radius:50%;border:1.5px solid var(--ink-soft);transition:background .15s,border-color .15s}
.mchip.on{color:var(--ink)}
.mchip.on::before{background:var(--acc);border-color:var(--acc)}
.mchip:active{transform:translateY(1px)}
/* Loop1 — 결과 탭 복사 */
.win-in{cursor:pointer}
#slot .copyhint{font-size:.5rem;letter-spacing:.14em;color:var(--ink-soft);opacity:.7;margin-top:.15rem}
@keyframes flash{0%{background:var(--acc)}100%{background:#fff}}
.win-in.copied{animation:flash .5s ease}
@media(prefers-reduced-motion:reduce){
  #paperMask.run{animation:none!important;max-height:var(--ph,2000px)!important}
  #paperMask.torn,#rcptBig.open .big-paper,.ov.open .sheet{animation:none!important}
  .win-in.spin #slot{animation:none}
  .drop,.lever.pull .lever-arm,.lever.hint .lever-arm,.knob{animation:none!important;transition:none!important}
}
/* 선 아이콘 (이모지 대체) */
.ic svg{width:17px;height:17px;display:block}
#rcptPrint{display:flex;align-items:center;justify-content:center;gap:.4rem}
.ticker{display:flex;align-items:center;justify-content:center;gap:.32rem}
.ticker svg{width:12px;height:12px;display:block}
.tk-ic{display:flex;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="stage">
<div class="machine">
  <div class="head">
    <div class="knobs" aria-hidden="true">
      <span class="d raised"></span>
      <span class="ring recess"></span>
      <span class="bar recess"></span>
      <span class="ring recess"></span>
      <span class="d raised"></span>
    </div>
    <div class="logo recess"><b>곁, Besides<sup>®</sup></b></div>
    <div class="ticker" id="ticker" aria-hidden="true"><span class="tk-ic"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2.5c.5 4.7 1.8 6 6.5 6.5-4.7.5-6 1.8-6.5 6.5-.5-4.7-1.8-6-6.5-6.5 4.7-.5 6-1.8 6.5-6.5z"/></svg></span><span id="tickN">0</span></div>
    <div class="tools" role="group" aria-label="설정">
      <button class="tool" id="tSound" aria-pressed="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9.5a3.5 3.5 0 0 1 0 5"/><path d="M18.5 7a7 7 0 0 1 0 10"/></svg>소리</button>
      <button class="tool" id="tMotion" aria-pressed="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8"/></svg>릴</button><input type="color" class="knob" id="hue" aria-label="테마 색 고르기" value="#acafff">
    </div>
  </div>

  <div class="window recess">
    <div class="win-in" id="winin">
      <div id="slot" aria-live="polite" aria-atomic="true"><div class="k">READY</div><div class="tx">오늘 곁에 둘 아이디어 한 조각.</div></div>
    </div>
  </div>
  <div class="status" id="status">카테고리를 선택해주세요.</div>

  <div class="actbar">
    <div class="modes" id="modes" role="group" aria-label="영감 틀 고르기">
      <button class="mchip on" data-m="단어">단어</button>
      <button class="mchip" data-m="질문">질문</button>
    </div>

  const m=$("#paperMask"),rc=$("#receipt");if(!m||!rc)return;
  rcStage=0;m.classList.remove("torn","run");m.style.clipPath="";m.style.display="block";m.style.maxHeight="";
  const tray=document.querySelector(".tray");if(tray)m.style.top=(tray.offsetTop+tray.offsetHeight-6)+"px";
  _ph=(rc.scrollHeight||600)+24;m.style.setProperty("--ph",_ph+"px");
  if(REDUCED){setPrinted();return}
  const dur=Math.min(7,Math.max(3,_ph/95));m.style.setProperty("--pdur",dur.toFixed(2)+"s");
  void m.offsetWidth;m.classList.add("run");status("인쇄 중…");
  clearTimeout(_rct);
  const ae=()=>{m.removeEventListener("animationend",ae);if(rcStage<1)setPrinted()};
  m.addEventListener("animationend",ae);
  _rct=setTimeout(()=>{if(rcStage<1)setPrinted()},(dur*1000)+450);
}
function zigzag(){let p=[];const n=30;for(let i=0;i<=n;i++){p.push((i/n*100).toFixed(2)+"% "+(i%2?0:7)+"px")}p.push("100% 100%","0% 100%");return"polygon("+p.join(",")+")"}
function tearSound(){if(S.muted)return;try{const a=actx();if(!a)return;for(let i=0;i<7;i++){const o=a.createOscillator(),g=a.createGain();o.type="square";o.frequency.value=1150+Math.random()*450;o.connect(g);g.connect(a.destination);const d=i*.035;g.gain.setValueAtTime(.0001,a.currentTime+d);g.gain.exponentialRampToValueAtTime(.04,a.currentTime+d+.003);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d+.03);o.start(a.currentTime+d);o.stop(a.currentTime+d+.04)}}catch(e){}}
function tearReceipt(){const m=$("#paperMask");if(!m)return;m.style.maxHeight=(_ph||2000)+"px";m.classList.remove("run");m.style.clipPath=zigzag();m.classList.remove("torn");void m.offsetWidth;m.classList.add("torn");if(navigator.vibrate)navigator.vibrate([6,36,6]);tearSound();rcStage=2;status("종이를 누르면 크게 볼 수 있어요")}
function enlargeReceipt(){const big=$("#rcptBigPaper");if(big)big.innerHTML=$("#receipt").innerHTML;openOv("rcptBig");if(rcStage<3)rcStage=3}
function paperClick(){if(rcStage===0){clearTimeout(_rct);setPrinted();return}if(rcStage===1){tearReceipt();return}enlargeReceipt()}
function bigRC(){const w=$("#rcptBigPaper");return w?w.querySelector(".rc"):null}
function saveReceiptImg(){const el=bigRC();if(!el){status("먼저 출력해주세요");return}
  if(typeof html2canvas!=="function"){alert("이미지 변환 모듈을 불러오지 못했어요.");return}
  status("이미지 만드는 중…");
  html2canvas(el,{backgroundColor:null,scale:2,useCORS:true,logging:false}).then(c=>{let u;try{u=c.toDataURL("image/png")}catch(err){alert("로컬 파일에서는 종이 질감이 담기지 않아요. GitHub 등에 올려서 열면 정상적으로 저장됩니다.");return}
    const a=document.createElement("a");a.href=u;a.download="곁-영수증-"+todayStr().replace(/-/g,"")+".png";document.body.appendChild(a);a.click();a.remove();status("이미지를 저장했어요")}).catch(()=>alert("이미지 저장에 실패했어요."))}
function printReceipt(){if(!bigRC()){status("먼저 출력해주세요");return}window.print()}
function copyReceipt(){if(!S.scraps.length){status("수집함이 비어 있어");return}copyText(S.scraps.map(s=>s.text).join("\n"))}
function copyReceiptImg(){const el=bigRC();if(!el){status("먼저 출력해주세요");return}if(typeof html2canvas!=="function"){status("이미지 모듈을 불러오지 못했어요");return}status("이미지 복사 중…");html2canvas(el,{backgroundColor:null,scale:2,useCORS:true,logging:false}).then(c=>{c.toBlob(b=>{if(!b){status("이미지 복사에 실패했어요");return}try{navigator.clipboard.write([new ClipboardItem({"image/png":b})]).then(()=>status("이미지를 복사했어요")).catch(()=>status("이 브라우저는 이미지 복사를 지원하지 않아요"))}catch(e){status("이 브라우저는 이미지 복사를 지원하지 않아요")}},"image/png")}).catch(()=>status("이미지 복사에 실패했어요"))}

/* ===== 노브 = 크림 색조 변경 ===== */
const SKINS=[
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#acafff","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#9fc4ff","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#8fe0cf","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#cfe6a6","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#ffb6c6","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#ffc4a6","#141414"],
  ["#ffffff","#ffffff","#f4f4f6","#ececf0","#141414","#ccc7ec","#141414"]
];
const NAMES=["라벤더","블루","민트","라임","블러시","코럴","라일락"];
let skinIdx=S.skinIdx||0;
function accInk(hex){hex=(hex||"#acafff").replace("#","");if(hex.length===3)hex=hex.replace(/./g,c=>c+c);const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);const f=v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4)};const L=.2126*f(r)+.7152*f(g)+.0722*f(b);return L>.42?"#141414":"#ffffff"}
function applySkin(){const s=SKINS[0],r=document.documentElement.style;r.setProperty("--c-bg",s[0]);r.setProperty("--c-body",s[1]);r.setProperty("--c-hi",s[2]);r.setProperty("--c-lo",s[3]);r.setProperty("--c-deep",s[4]);const acc=S.acc||"#acafff";r.setProperty("--acc",acc);r.setProperty("--acc-ink",accInk(acc))}
function renderModes(){document.querySelectorAll(".mchip").forEach(b=>b.classList.toggle("on",b.dataset.m===(S.mode||"전체")))}
function renderTick(){const n=$("#tickN");if(n)n.textContent=(S.count||0)}
function renderTools(){const s=$("#tSound"),m=$("#tMotion");if(s){s.classList.toggle("off",!!S.muted);s.setAttribute("aria-pressed",String(!S.muted))}if(m){m.classList.toggle("off",!!S.noReel);m.setAttribute("aria-pressed",String(!S.noReel))}}

/* ===== 오버레이 헬퍼 (포커스) ===== */
function trap(ov){const f=ov.querySelectorAll("button,textarea,[tabindex]");if(!f.length)return;const a=f[0],z=f[f.length-1];ov._kt=e=>{if(e.key!=="Tab")return;if(e.shiftKey&&document.activeElement===a){e.preventDefault();z.focus()}else if(!e.shiftKey&&document.activeElement===z){e.preventDefault();a.focus()}};ov.addEventListener("keydown",ov._kt)}
function openOv(id){const ov=$("#"+id);ov.classList.add("open");const f=ov.querySelector("textarea,button");if(f)setTimeout(()=>f.focus(),50);trap(ov)}
function closeOv(ov){ov.classList.remove("open");if(ov._kt){ov.removeEventListener("keydown",ov._kt);ov._kt=null}}
function updateBtns(){const a=$("#bSave");if(a){a.disabled=!last;a.classList.toggle("emph",!!last)}const r=$("#bRcpt");if(r)r.disabled=!S.scraps.length;const c=$("#bClear");if(c)c.disabled=!S.scraps.length;$("#bMemo").classList.toggle("lit",!!(S.memo||"").trim())}

/* ===== 배선 ===== */
$("#draw").onclick=pull;
$("#winin").onclick=(e)=>{if(spinning)return;const hl=e.target&&e.target.closest&&e.target.closest('.hl[data-slot]');if(hl){const si=+hl.getAttribute("data-slot");if(si>=0)reroll(si);return}if(!last)pull()};
$("#bSave").onclick=keepSpark;
$("#bMemo").onclick=openMemo;
$("#bList").onclick=()=>{renderScraps();openOv("scrapOv")};
$("#bClear").onclick=()=>openOv("clearOv");
$("#bRcpt").onclick=buildReceipt;
$("#paperMask").onclick=paperClick;
$("#paperMask").addEventListener("contextmenu",e=>{e.preventDefault();discardReceipt()});
function discardReceipt(){const m=$("#paperMask");if(!m||rcStage<1)return;m.classList.remove("run","torn");m.style.clipPath="";m.style.transition="max-height .42s ease";m.style.maxHeight="0px";rcStage=0;setTimeout(()=>{m.style.display="none";m.style.transition=""},440);status("영수증을 버렸어요")}
$("#bigCopy").onclick=copyReceipt;
$("#bigImgCopy").onclick=copyReceiptImg;
$("#bigSave").onclick=saveReceiptImg;
$("#tSound").onclick=()=>{S.muted=!S.muted;save();renderTools();status(S.muted?"소리 꺼짐":"소리 켜짐")};
$("#tMotion").onclick=()=>{S.noReel=!S.noReel;save();renderTools();status(S.noReel?"릴 모션 꺼짐":"릴 모션 켜짐")};
(function(){const hue=$("#hue");if(!hue)return;hue.value=S.acc||"#acafff";const ap=e=>{S.acc=e.target.value;applySkin();save()};hue.addEventListener("input",ap);hue.addEventListener("change",e=>{ap(e);status("테마색을 바꿨어요")})})();
document.querySelectorAll(".mchip").forEach(b=>b.onclick=()=>{S.mode=b.dataset.m;save();renderModes();status(S.mode+(bat(S.mode)?"을":"를")+" 뽑습니다.")});
$("#memoSave").onclick=()=>{S.memo=$("#memoText").value;save();closeOv($("#memoOv"));updateBtns()};
$("#memoText").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();$("#memoSave").click()}});
$("#clearYes").onclick=()=>{S.scraps=[];save();renderScraps();closeOv($("#clearOv"));updateBtns();status("수집함을 비웠어요")};
$("#scrapList").addEventListener("click",e=>{const b=e.target.closest("[data-del]");if(b){S.scraps=S.scraps.filter(x=>x.id!==b.dataset.del);save();renderScraps();updateBtns();return}const it=e.target.closest(".si");if(it){const t=it.querySelector(".st");if(t)copyText(t.textContent)}});
document.querySelectorAll(".ov").forEach(o=>o.addEventListener("click",e=>{if(e.target===o||e.target.dataset.close!==undefined)closeOv(o)}));
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".ov.open").forEach(o=>closeOv(o))});
document.addEventListener("keydown",e=>{
  if(document.querySelector(".ov.open"))return;
  const t=(e.target&&e.target.tagName||"").toLowerCase();
  if(t==="textarea"||t==="input")return;
  if(e.code==="Space"){if(t==="button")return;e.preventDefault();pull();return}
  if(e.key==="Enter"){if(t==="button")return;e.preventDefault();keepSpark();return}
});
window.addEventListener("storage",e=>{if(e.key===KEY){const d=read(KEY);if(valid(d)){S=Object.assign(S,d);applySkin();renderModes();renderTick();renderTools();updateBtns();if($("#scrapOv").classList.contains("open"))renderScraps()}}});
window.addEventListener("beforeunload",()=>{try{save()}catch(e){}});

/* ===== 시작 ===== */
applySkin();renderModes();renderTick();renderTools();updateBtns();
if(!REDUCED){const dv=$("#draw");if(dv){dv.classList.add("hint");setTimeout(()=>dv.classList.remove("hint"),3200)}}
</script>
</body>
